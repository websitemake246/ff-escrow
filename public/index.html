<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FF Escrow — Free Fire Middleman</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <a href="#/browse" class="brand">⚡ FF Escrow</a>
      <nav class="nav" id="mainNav"></nav>
      <div class="actions" id="navActions"></div>
    </header>

    <main class="container">
      <section id="hero" class="hero">
        <div class="hero-card">
          <h1>Free Fire Account Escrow</h1>
          <p>Buy and sell accounts with middleman protection. Funds are held safely until both sides confirm.</p>
          <div class="row" style="gap:12px; margin-top: 18px;">
            <a href="#/browse" class="btn btn-primary">Browse Listings</a>
            <a href="#/sell" class="btn btn-ghost">Start Selling</a>
          </div>
        </div>
      </section>

      <section id="browseSection" class="page hidden">
        <div class="toolbar">
          <input id="browseQ" class="input" placeholder="Search listings..." />
        </div>
        <div id="listGrid" class="grid"></div>
      </section>

      <section id="sellSection" class="page hidden">
        <div class="card">
          <h2>Create Listing</h2>
          <form id="createForm" class="form">
            <div class="field"><label>Title</label><input name="title" class="input" required /></div>
            <div class="field"><label>Platform</label><input name="platform" class="input" required /></div>
            <div class="field"><label>Description</label><textarea name="description" class="textarea"></textarea></div>
            <div class="field"><label>Price (₦)</label><input name="price_kobo" type="number" class="input" required /></div>
            <button class="btn btn-primary" type="submit">Create Listing</button>
          </form>
        </div>
      </section>

      <section id="dealsSection" class="page hidden">
        <div class="card"><h2>My Deals</h2><div id="dealList"></div></div>
      </section>

      <section id="adminSection" class="page hidden">
        <div class="card"><h2>Admin</h2><div id="adminPanel"></div></div>
      </section>

      <section id="authSection" class="page hidden">
        <div class="card auth-card">
          <h2 id="authTitle">Login</h2>
          <form id="authForm" class="form"></form>
          <p id="authSwitch" class="muted"></p>
        </div>
      </section>
    </main>

    <div id="toasts" class="toasts"></div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
